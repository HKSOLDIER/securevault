spring:
  application:
    name: securevault-api

  datasource:
      url: jdbc:postgresql://ep-wandering-scene-aqg8k6so-pooler.c-8.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
      username: neondb_owner
      password: npg_vyLUa3q9fFKH
      driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never

# ─── Security Configuration ──────────────────────────────────────────────────
# ─── Security Configuration ──────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz12}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  argon2:
    memory-kb: 65536
    iterations: 3
    parallelism: 4
    hash-length: 32
    salt-length: 16
  pepper: ${PEPPER_SECRET:abcdefghijklmnopqrstuvwxyz123456}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://securevault-three.vercel.app}
  rate-limit:
    login-capacity: 5
    login-refill-minutes: 15
    register-capacity: 20
    register-refill-hours: 1

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.securevault: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
