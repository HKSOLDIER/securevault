spring:
  application:
    name: securevault-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://neondb_owner:npg_vyLUa3q9fFKH@ep-wandering-scene-aqg8k6so-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_vyLUa3q9fFKH}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never

# ─── Security Configuration ──────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-256bit-random-secret-in-production-never-use-default}
    access-token-expiry-ms: 900000         # 15 minutes
    refresh-token-expiry-ms: 604800000     # 7 days
  argon2:
    # Server-side Argon2id config (for pepper-based re-hash verification)
    memory-kb: 65536        # 64 MB
    iterations: 3
    parallelism: 4
    hash-length: 32
    salt-length: 16
  pepper: ${PEPPER_SECRET:changeme-use-a-random-pepper-in-production}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://securevault-three.vercel.app/}
  rate-limit:
    login-capacity: 5          # 5 attempts
    login-refill-minutes: 15   # per 15 minutes
    register-capacity: 3
    register-refill-hours: 1

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.securevault: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
