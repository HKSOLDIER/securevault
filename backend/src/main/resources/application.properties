# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Neon PostgreSQL (set these in Render environment variables) ───────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon requires SSL
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Generate with: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ─── AES Encryption (for stored passwords) ────────────────────────────────────
# 32-byte key: openssl rand -base64 32
app.encryption.key=${ENCRYPTION_KEY}

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://your-app.vercel.app}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.securevault=INFO
logging.level.org.springframework.security=WARN
